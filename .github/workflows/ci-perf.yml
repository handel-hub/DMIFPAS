name: CI Tests and Perf

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run unit tests
        run: |
          pytest -q tests/test_dispatcher_unit.py::test_T1_T2_trace_equivalence -q
          pytest -q tests/test_dispatcher_unit.py -q
      - name: Run fuzz tests (optional heavy)
        run: |
          pytest -q tests/test_dispatcher_fuzz.py -q

  perf-regression:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
      - name: Run trimmed benchmark
        id: bench
        run: |
          python tools/benchmark_trimmed.py > perf/out.json
          cat perf/out.json
      - name: Compare to baseline
        run: |
          python - <<'PY'
import json, sys, os
delta = 0.15  # 15% allowed regression
out_path = "perf/out.json"
baseline_path = "perf/baseline_perf.json"
if not os.path.exists(out_path):
    print("Missing perf/out.json"); sys.exit(2)
with open(out_path) as f:
    out = json.load(f)
median = out.get("median_time_s")
if median is None:
    print("Invalid benchmark output"); sys.exit(2)
if not os.path.exists(baseline_path):
    os.makedirs("perf", exist_ok=True)
    with open(baseline_path, "w") as bf:
        json.dump({"median_time_s": median}, bf)
    print("Baseline created:", median)
    sys.exit(0)
with open(baseline_path) as bf:
    base = json.load(bf)
base_median = base.get("median_time_s")
if base_median is None:
    print("Invalid baseline"); sys.exit(2)
threshold = base_median * (1.0 + delta)
print(f"baseline={base_median:.6f} median={median:.6f} threshold={threshold:.6f}")
if median > threshold:
    print("Performance regression detected")
    sys.exit(1)
print("Performance within threshold")
sys.exit(0)
PY
